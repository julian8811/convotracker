<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <rect width="1100" height="620" fill="#090f1b"/>
  <rect x="40" y="40" width="1020" height="540" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="40" y="40" width="1020" height="40" rx="16" fill="#1f2937"/>
  <text x="70" y="66" fill="#cbd5e1" font-size="18" font-family="Consolas, monospace">Terminal - Compresion y respaldo de resultados</text>
  <text x="70" y="120" fill="#22d3ee" font-size="24" font-family="Consolas, monospace">$ tar -czvf resultados_run1.tar.gz resultados_run1/</text>
  <text x="70" y="152" fill="#e2e8f0" font-size="18" font-family="Consolas, monospace">resultados_run1/qc_report.html</text>
  <text x="70" y="180" fill="#e2e8f0" font-size="18" font-family="Consolas, monospace">resultados_run1/variants.vcf</text>
  <text x="70" y="208" fill="#e2e8f0" font-size="18" font-family="Consolas, monospace">resultados_run1/logs/pipeline.log</text>
  <text x="70" y="254" fill="#22d3ee" font-size="24" font-family="Consolas, monospace">$ du -sh resultados_run1</text>
  <text x="70" y="286" fill="#e2e8f0" font-size="20" font-family="Consolas, monospace">1.8G    resultados_run1</text>
  <text x="70" y="332" fill="#22d3ee" font-size="24" font-family="Consolas, monospace">$ df -h</text>
  <text x="70" y="364" fill="#e2e8f0" font-size="18" font-family="Consolas, monospace">/dev/sda2        250G  120G  118G  51%  /</text>
  <text x="70" y="410" fill="#22d3ee" font-size="24" font-family="Consolas, monospace">$ gzip matriz_expresion.tsv</text>
  <text x="70" y="442" fill="#e2e8f0" font-size="18" font-family="Consolas, monospace">matriz_expresion.tsv.gz creado</text>
  <text x="70" y="516" fill="#94a3b8" font-size="18" font-family="Consolas, monospace">Captura didactica: empaquetado, uso de disco y compresion de salidas.</text>
</svg>
