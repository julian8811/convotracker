# Render Blueprint: backend ConvoTracker
# Conectar este repo y crear servicio desde Dashboard o con render-cli.
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: convotracker-api
    runtime: python
    region: oregon

    # Raíz del backend
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.2"
      # Opcional: añadir orígenes CORS si el front está en otro dominio
      # - key: CORS_ORIGINS_EXTRA
      #   value: https://tu-front.onrender.com
